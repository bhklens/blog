# Site
name: "bhklens"
title: "bhklens blog"
description: "Making sense of Indian real estate, one square foot at a time."
logo: 'assets/images/bhklens.svg'
favicon: 'assets/images/bhklens.svg'
baseurl: ""
google_analytics: 'UA-xxxxxxxx-1'
disqus: 'demowebsite'
mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'
include: ["_pages"]
permalink: /:title/
email: contact@bhklens.com

# Authors
authors:
  priyank:
    name: Priyank
    display_name: Priyank
    avatar: 'assets/images/priyank.jpg'
    email: priyank@bhklens.com.com
    web: https://www.priyankt.com
    twitter: https://twitter.com/priyankgt
    description: "Founder at bhklens. Likes to blog stuff that is not easily available on the net about Indian real estate"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
highlighter: none
markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true



# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

# Post Author Box ("enabled" or "disabled")
authorbox: "enabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
